<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/dist/output.css" rel="stylesheet">
    <title>Shipwrights Dashboard</title>
</head>

<body class="bg-background text-foreground min-h-screen flex p-6 gap-6 font-sans antialiased"
    style="background-image: radial-gradient(#3434348d 1px, transparent 1px); background-size: 30px 30px;">

    <aside class="w-64 bg-glass/50 backdrop-blur-md border border-blue-300 rounded-3xl flex flex-col p-6 relative z-20">
        <div class="flex items-center gap-3 px-2 mb-10">
            <div class="h-8 w-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-sm">S
            </div>
            <h1 class="font-bold font-mono text-sm tracking-tight">SW Dash</h1>
        </div>

        <nav class="flex-1 space-y-1">
            <a href="/src/index.html"
                class="flex items-center px-4 py-2 bg-primary/10 text-primary rounded-xl transition-all">
                <span class="text-xs font-semibold">My Stats</span>
            </a>
            <a href="/src/queue/index.html"
                class="flex items-center px-4 py-2 hover:bg-accent/50 rounded-xl transition-all text-muted-foreground hover:text-foreground">
                <span class="text-xs font-medium">Cert queue</span>
            </a>
            <a href="#"
                class="flex items-center px-4 py-2 hover:bg-accent/50 rounded-xl transition-all text-muted-foreground hover:text-foreground">
                <span class="text-xs font-medium">Support</span>
            </a>
        </nav>

        <div class="mt-auto pt-6 border-t border-glass-border flex items-center gap-3">
            <div class="w-7 h-7 rounded-full bg-accent"></div>
            <div class="overflow-hidden">
                <p class="text-[11px] font-bold truncate">CoolCream</p>
                <p class="text-[10px] opacity-40 uppercase tracking-tighter font-mono">SHIPWRIGHT</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col gap-6 overflow-y-auto">

        <header class="flex items-center justify-between px-2 py-2">
            <div>
                <h2 class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em]">Dashboard</h2>
                <p class="text-lg font-bold tracking-tight">Cert stats</p>
            </div>
            <div class="h-8 w-8 rounded-full border border-glass-border bg-accent/20"></div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="p-5 bg-glass/30 border border-glass-border rounded-2xl">
                <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Total Certs</span>
                <p class="text-2xl font-bold mt-1">1,568</p>
            </div>

            <div class="p-5 bg-glass/30 border border-glass-border rounded-2xl">
                <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Approved</span>
                <p class="text-2xl font-bold mt-1 text-emerald-600/80">876</p>
            </div>

            <div class="p-5 bg-glass/30 border border-glass-border rounded-2xl">
                <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Rejected</span>
                <p class="text-2xl font-bold mt-1 text-red-600/80">692</p>
            </div>

            <div class="p-5 bg-glass/30 border border-glass-border rounded-2xl">
                <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Cookies</span>
                <p class="text-2xl font-bold mt-1 text-amber-600/80">326.87</p>
            </div>
        </div>

        <section class="flex-1 bg-glass/20 border border-glass-border rounded-4xl p-8 shadow-sm">
            <div class="mb-8 border-b border-glass-border pb-4">
                <h3 class="text-sm font-bold opacity-80 uppercase tracking-widest">By Type</h3>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl">

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Web App</span>
                    <p class="text-xl font-bold">425</p>
                </div>

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Extension</span>
                    <p class="text-xl font-bold">118</p>
                </div>

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Android
                        App</span>
                    <p class="text-xl font-bold">150</p>
                </div>

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">IOS App</span>
                    <p class="text-xl font-bold">225</p>
                </div>

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Other</span>
                    <p class="text-xl font-bold">310</p>
                </div>

                <div class="group py-4 border-b border-glass-border hover:border-primary/40 transition-colors">
                    <span class="text-[10px] font-bold uppercase text-muted-foreground tracking-widest">Desktop App
                        (windows)</span>
                    <p class="text-xl font-bold">340</p>
                </div>

            </div>
        </section>
    </main>
</body>

</html>
